apiVersion: v1
kind: Service
metadata: 
  name: sqlagent-service
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "4"
  labels: 
        app: sqlagent-service
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: http-alt
    port: 8081
    targetPort: 8081
  selector: 
      app: sqlagent
  sessionAffinity: None

